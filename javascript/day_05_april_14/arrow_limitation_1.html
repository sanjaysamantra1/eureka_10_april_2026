<script>
    let user = {
        firstName: 'Virat',
        lastName: 'Kohli',

        fullName1: function () {
            console.log('FullName1: ', this);  // this = user
            console.log(this.firstName, this.lastName); // Virat Kohli
        },
        fullName2: () => {
            console.log('FullName1: ', this);  // this = window
            console.log(this.firstName, this.lastName); // undefined undefined
        }
    }
    user.fullName1();
    user.fullName2();
</script>
