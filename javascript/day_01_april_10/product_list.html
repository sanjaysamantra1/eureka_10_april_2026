<!DOCTYPE html>
<html lang="en">

<link>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</link>
<style>
    button {
        padding: 10px 20px;
    }

    h1 {
        color: red;
    }
</style>
</head>

<body>
    <h1 class="text-center">Product List</h1>
    <div class="container">
        <div class="row">
            <div class="col-sm-8">
                <input type="search" placeholder="Search Product..." class="form-control">
            </div>
            <div class="col-sm-4">
                <button class="btn btn-primary">Sort Asc</button>
                <button class="btn btn-secondary">Sort Desc</button>
            </div>
        </div>
        <div id="productContainer" class="row mt-3">
        </div>
    </div>


    <script>
        async function fetchProduct() {
            let response = await fetch('https://dummyjson.com/products');
            let productObj = await response.json();
            let productArr = productObj.products;
            console.log(productArr)
            const conteiner = document.getElementById('productContainer');
            productArr.forEach(product => {
                const col = document.createElement('div');
                col.className = 'col-sm-3 mb-2';
                col.innerHTML = `
                <div class="card text-center">
                    <img src="${product.images[0]}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">${product.title}</h5>
                        <p class="card-text">${product.category}</p>
                        <p class="card-text">${product.brand}</p>
                        <p class="card-text">${product.price}</p>
                        <p class="card-text">${product.rating}</p>
                        <a href="#" class="btn btn-primary">Details</a>
                    </div>
                </div>
                `;
                conteiner.appendChild(col);
            })
        }
        fetchProduct()
    </script>

</body>

</html>
