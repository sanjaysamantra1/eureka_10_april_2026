<script>
    let arr1 = [10, 20];
    let arr2 = arr1; // Reference Copy / Address Copy
    // A new array is not created, address of arr1 got copied to arr2
    arr2.push(30, 40);
    console.log('arr1: ', arr1);
    console.log('arr2: ', arr2);


    let arr3 = [10, 20, [30, 31]];
    let arr4 = [...arr3]; // Spread Operator :  Shallow Copy
    // Shallow Copy : Top level Elements are copied by value, nested elements are copied by reference
    arr4.push(40, 50);
    arr4[2].push(32, 33);
    console.log('arr3: ', arr3);
    console.log('arr4: ', arr4);


    let arr5 = [10, 20, [30, 31]];
    let arr6 = structuredClone(arr5); // Deep Copy
    // Not only top level elements but also nested elements are copied by value
    arr6.push(40, 50);
    arr6[2].push(32, 33);
    console.log('arr5: ', arr5);
    console.log('arr6: ', arr6);
</script>
