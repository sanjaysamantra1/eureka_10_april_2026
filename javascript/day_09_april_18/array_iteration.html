<script>
    let cars = ['Tata', 'Honda', 'Maruti', 'Hyundai'];
    // 1.loop  
    for (let i = 0; i < cars.length; i++) {
        console.log(cars[i]);
    }
    console.log('=================');

    // 2. for-in  ES_6
    for (i in cars) {
        console.log(cars[i]);
    }
    console.log('=================');

    // 3. for-of  ES_6
    for (car of cars) {
        console.log(car);
    }
    console.log('=================');

    // 4. forEach()
    cars.forEach((val, ind) => {
        console.log(val, ind);
    })
</script>
