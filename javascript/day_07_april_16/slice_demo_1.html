<script>
    let str = 'this is javascript class';

    console.log(str.slice(2)); // start=2 end=till end
    console.log(str.substring(2)); // start=2 end=till end

    console.log(str.slice(2, 12)); //start=2 , end=11
    console.log(str.substring(2, 12)); //start=2 , end=11

    console.log(str.slice(2, -2)); //slice works with -ve index
    console.log(str.substring(2, -2)); //substring doesnt work with -ve index

</script>
