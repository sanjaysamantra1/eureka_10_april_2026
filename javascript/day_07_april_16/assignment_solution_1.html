<script>
    // 1. WAP to reverse a string
    let str = 'javascript';
    let resvStr = str.split('').reverse().join('');
    console.log(resvStr);

    // 2. WAP to reverse words
    let str2 = 'This is javascript class';
    let resvStr2 = str2.split(' ').reverse().join(' ');
    console.log(resvStr2);


    // 3. WAP to print the first non-repeated character in a string
    let str3 = 'entertainment';
    for (char of str3) {
        if (str3.indexOf(char) === str3.lastIndexOf(char)) {
            console.log(char);
            break;
        }
    }

    // 4. WAP to print a string in title case
    let str4 = 'this is javascript class';
    let res4 = '';
    let words = str4.split(' ');
    for (word of words) {
        word = word[0].toUpperCase() + word.slice(1);
        res4 = res4 + word + ' ';
    }
    console.log(res4)


    // 5. WAP to find longest word in a sentence
    let str5 = 'this is javascript class'
    let words_5 = str5.split(' ');
    let longest = '';
    for (word of words_5) {
        if (word.length > longest.length) {
            longest = word;
        }
    }
    console.log(longest)
</script>
