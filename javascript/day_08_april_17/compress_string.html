<script>
    // input: aaabbc
    // output : a3b2c1
    function compressString(str) {
        let result = '';
        let count = 1;
        for (let i = 0; i < str.length; i++) {
            if (str[i] == str[i + 1]) {
                count++;
            } else {
                result = result + str[i] + count;
                count = 1;
            }
        }
        return result;
    }
    console.log(compressString('AAABBC')); // A3B2C1
</script>
