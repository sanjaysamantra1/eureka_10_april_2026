<script>
    function toRoman(num) {
        let romanStr = '';
        let romanObj = {
            M: 1000, CM: 900, D: 500, CD: 400,
            C: 100, XC: 90, L: 50, XL: 40,
            X: 10, IX: 9, V: 5, IV: 4, I: 1
        }
        for (key in romanObj) {
            let value = romanObj[key];
            while (num >= value) {
                romanStr = romanStr + key;
                num = num - value;
            }
        }
        return romanStr;
    }
    console.log(toRoman(12)); // XII
</script>
